name: run-tests

on:
  push:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'phpunit.xml.dist'
      - 'composer.json'
      - 'composer.lock'
  pull_request:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'phpunit.xml.dist'
      - 'composer.json'
      - 'composer.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            php: '8.2'
            laravel: 10.*
            testbench: 8.*
            pest: 2.36.1
            pest-plugin-laravel: 2.4.0
            pest-plugin-arch: 2.7.0
            collision: ^7.11
            larastan: ^2.0
            stability: prefer-lowest
          - os: ubuntu-latest
            php: '8.2'
            laravel: 10.*
            testbench: 8.*
            pest: 2.36.1
            pest-plugin-laravel: 2.4.0
            pest-plugin-arch: 2.7.0
            collision: ^7.11
            larastan: ^2.0
            stability: prefer-stable
          - os: ubuntu-latest
            php: '8.2'
            laravel: 11.*
            testbench: 9.*
            pest: ^3.0
            pest-plugin-laravel: ^3.0
            pest-plugin-arch: ^3.0
            collision: ^8.0
            larastan: ^3.0
            stability: prefer-lowest
          - os: ubuntu-latest
            php: '8.2'
            laravel: 11.*
            testbench: 9.*
            pest: ^3.0
            pest-plugin-laravel: ^3.0
            pest-plugin-arch: ^3.0
            collision: ^8.0
            larastan: ^3.0
            stability: prefer-stable
          - os: ubuntu-latest
            php: '8.2'
            laravel: 12.*
            testbench: 10.*
            pest: ^3.0
            pest-plugin-laravel: ^3.0
            pest-plugin-arch: ^3.0
            collision: ^8.0
            larastan: ^3.0
            stability: prefer-lowest
          - os: ubuntu-latest
            php: '8.2'
            laravel: 12.*
            testbench: 10.*
            pest: ^3.0
            pest-plugin-laravel: ^3.0
            pest-plugin-arch: ^3.0
            collision: ^8.0
            larastan: ^3.0
            stability: prefer-stable
          - os: ubuntu-latest
            php: '8.3'
            laravel: 13.*
            testbench: 11.*
            pest: ^4.0
            pest-plugin-laravel: ^4.0
            pest-plugin-arch: ^4.0
            collision: ^8.0
            larastan: ^3.0
            stability: prefer-lowest
          - os: ubuntu-latest
            php: '8.3'
            laravel: 13.*
            testbench: 11.*
            pest: ^4.0
            pest-plugin-laravel: ^4.0
            pest-plugin-arch: ^4.0
            collision: ^8.0
            larastan: ^3.0
            stability: prefer-stable
          - os: windows-latest
            php: '8.3'
            laravel: 13.*
            testbench: 11.*
            pest: ^4.0
            pest-plugin-laravel: ^4.0
            pest-plugin-arch: ^4.0
            collision: ^8.0
            larastan: ^3.0
            stability: prefer-stable

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        shell: bash
        run: |
          composer require --dev "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "pestphp/pest:${{ matrix.pest }}" "pestphp/pest-plugin-laravel:${{ matrix.pest-plugin-laravel }}" "pestphp/pest-plugin-arch:${{ matrix.pest-plugin-arch }}" "nunomaduro/collision:${{ matrix.collision }}" "larastan/larastan:${{ matrix.larastan }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: List Installed Dependencies
        shell: bash
        run: composer show -D

      - name: Execute tests
        shell: bash
        run: vendor/bin/pest --ci
